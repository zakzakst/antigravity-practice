<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - BookLog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">
    <header>
        <a href="index.html" class="logo">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            BookLog
        </a>
    </header>

    <main class="container fade-in" style="flex: 1; display: flex; align-items: center; justify-content: center; width: 100%;">
        <div class="form-container">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--text-main);">おかえりなさい</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem;">ログインして読書記録を続けましょう</p>
            </div>

            <form action="mypage.html" method="get">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" placeholder="tanaka@example.com" value="test@example.com">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" value="password">
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.85rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-muted); font-weight: normal;">
                        <input type="checkbox" style="width: auto;"> ログイン状態を保持する
                    </label>
                    <a href="#" style="color: var(--primary); text-decoration: none;">パスワードを忘れた場合</a>
                </div>

                <button type="submit" class="btn" style="width: 100%; padding: 0.8rem; font-size: 1rem;">ログインする</button>
            </form>

            <div style="margin-top: 2rem; position: relative; text-align: center;">
                <hr style="border: 0; border-top: 1px solid var(--border);">
                <span style="position: absolute; top: -0.7rem; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 0 1rem; color: var(--text-muted); font-size: 0.85rem;">または</span>
            </div>

            <p style="text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--text-muted);">
                アカウントをお持ちでないですか？ <a href="#" style="color: var(--primary); font-weight: 500; text-decoration: none;">新規登録</a>
            </p>
        </div>
    </main>
</body>
</html>
